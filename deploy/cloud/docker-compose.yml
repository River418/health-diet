services:
  # ==================== 数据库服务 ====================
  postgres:
    image: postgres:15-alpine
    container_name: health-diet-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - health-diet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: health-diet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - health-diet-network
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ==================== 后端服务 ====================
  backend:
    build:
      context: ../../backend
      dockerfile: ../deploy/cloud/Dockerfile.backend
    container_name: health-diet-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3100}:3000"
    volumes:
      - upload_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Node环境
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      # 数据库连接
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      # Redis连接
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      # JWT配置
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      # 微信小程序
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      # 抖音小程序
      DOUYIN_APP_ID: ${DOUYIN_APP_ID:-}
      DOUYIN_APP_SECRET: ${DOUYIN_APP_SECRET:-}
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # 其他
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - health-diet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ==================== H5 前端服务 ====================
  h5:
    build:
      context: ../../frontend
      dockerfile: ../deploy/cloud/Dockerfile.h5
      args:
        TARO_APP_API_URL: ${TARO_APP_API_URL}
    container_name: health-diet-h5
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - health-diet-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 管理后台 ====================
  admin:
    build:
      context: ../../admin-web
      dockerfile: ../deploy/cloud/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: health-diet-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - health-diet-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: health-diet-nginx
    restart: unless-stopped
    ports:
      - "31080:80"
      - "31443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
      - ssl_certs:/etc/letsencrypt:ro
    depends_on:
      - h5
      - admin
      - backend
    networks:
      - health-diet-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ==================== SSL 证书管理 ====================
  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: health-diet-certbot
    restart: unless-stopped
    volumes:
      - ssl_certs:/etc/letsencrypt
      - certbot_logs:/var/log/letsencrypt
      - ./.secrets/cloudflare.ini:/etc/letsencrypt/cloudflare.ini:ro
    networks:
      - health-diet-network
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h; done"

networks:
  health-diet-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local
  logs_data:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  ssl_certs:
    driver: local
  certbot_logs:
    driver: local